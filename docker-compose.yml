services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_api_app
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - DB_ADDR=postgres://user:user123@db:5432/finance_api_db?sslmode=disable
      - ADDR=:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finance_net
  db:
    image: postgres:15-alpine
    container_name: finance_api_db_container
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-user123}
      - POSTGRES_DB=${DB_NAME:-finance_api_db}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d finance_api_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finance_net

networks:
  finance_net:
    driver: bridge